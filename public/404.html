<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Aniketh Vustepalle</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GH Pages can't find a path (e.g. /portfolio/work/6),
      // it serves this 404.html. We encode the path into a query
      // string and redirect to the root, where index.html decodes it
      // and restores the correct URL before React boots.
      // segmentCount = 1 because the app lives at /portfolio/ (one segment deep).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
